<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Endura – Praktijk voor Fysiotherapie en Manuele Natuurgeneeskunde</title>
  <meta name="description" content="Endura – Praktijk voor Fysiotherapie en Manuele Natuurgeneeskunde in Arnhem en Nijmegen." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F7F2EC;
      --cream-dark: #EDE5D8;
      --warm-brown: #8B6B4A;
      --warm-brown-light: #B8936A;
      --deep-brown: #3D2B1F;
      --text-muted: #7A6052;
      --text-light: #A08068;
      --white: #FDFAF6;
    }
    html { height: 100%; }
    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--deep-brown);
      font-weight: 300;
      font-size: 16px;
      line-height: 1.75;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .ornament {
      width: 48px;
      height: 1px;
      background: var(--warm-brown-light);
      margin: 0 auto 2.5rem;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 400;
      color: var(--deep-brown);
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--warm-brown);
      margin-bottom: 3rem;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--cream-dark);
      margin: 0 auto 2.5rem;
    }

    .message {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem;
      font-weight: 300;
      font-style: italic;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 3rem;
    }

    .contact {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      font-size: 0.93rem;
      color: var(--text-muted);
    }

    .contact-item svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      color: var(--warm-brown-light);
    }

    .contact-item a {
      color: var(--warm-brown);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item a:hover {
      color: var(--deep-brown);
    }

    footer {
      margin-top: 4rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--text-light);
    }

    @media (max-width: 480px) {
      .logo { font-size: 2.2rem; }
      .message { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="ornament"></div>

  <h1 class="logo">Endura</h1>
  <p class="subtitle">Praktijk voor Fysiotherapie en Manuele Natuurgeneeskunde</p>

  <div class="divider"></div>

  <p class="message">We werken aan onze nieuwe website.<br>Binnenkort zijn we hier te vinden.</p>

  <div class="contact">
    <div class="contact-item">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 4 L8 9 L14 4 M2 4 H14 V12 H2 Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <a href="mailto:info@endurafysio.nl">info@endurafysio.nl</a>
    </div>
    <div class="contact-item">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 2 C3 2 2 3 2 5 C2 9 7 14 11 14 C13 14 14 13 14 13 L11.5 10 L9.5 10.5 C9.5 10.5 7.5 8.5 7 6.5 L8 4.5 Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
      <a href="tel:0649878410">06-49878410</a>
    </div>
  </div>
</div>

<footer>© 2025 Endura · Arnhem / Nijmegen</footer>

</body>
</html>
